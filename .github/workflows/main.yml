name: Textile News

on:
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:

    - name: 下载代码
      uses: actions/checkout@v4


    - name: 安装Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'


    - name: 执行程序
      run: |
        python main.py
