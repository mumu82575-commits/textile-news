name: Textile-News

on:
  workflow_dispatch:

jobs:
  run-python:

    runs-on: ubuntu-latest

    steps:

      - name: 获取仓库代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行程序
        run: |
          python main.py

      - name: 上传Excel
        uses: actions/upload-artifact@v4
        with:
          name: excel
          path: "*.xlsx"
